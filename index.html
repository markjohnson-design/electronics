<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCSE Electronics: Voltage Divider</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 1.5rem;
            margin-top: 0;
        }
        /* Circuit Diagram Container Styles */
        .diagram-container {
            background: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        .control-group {
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
        }
        label {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 10px;
            color: #4a5568;
        }
        .val-display { color: #3182ce; }
        input[type=range] { width: 100%; cursor: pointer; }
        .output-box {
            background: #2b6cb0;
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-top: 20px;
        }
        .output-value {
            font-size: 2rem;
            font-weight: bold;
            margin: 5px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Voltage Divider Simulator</h1>

        <div class="diagram-container">
            <svg viewBox="0 0 450 300" width="100%" height="250" xmlns="http://www.w3.org/2000/svg" stroke="#2d3748" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
                
                <line x1="50" y1="50" x2="50" y2="110" />
                <line x1="25" y1="110" x2="75" y2="110" stroke-width="4"/>
                <line x1="35" y1="130" x2="65" y2="130" stroke-width="4"/>
                <line x1="25" y1="150" x2="75" y2="150" stroke-width="4"/>
                <line x1="35" y1="170" x2="65" y2="170" stroke-width="4"/>
                <line x1="25" y1="190" x2="75" y2="190" stroke-width="4"/>
                <line x1="50" y1="190" x2="50" y2="250" />
                <text x="85" y="155" fill="#3182ce" stroke="none" font-size="18" font-family="sans-serif" font-weight="bold" id="svg-vin">9V</text>

                <line x1="50" y1="50" x2="140" y2="50" />
                <circle cx="140" cy="50" r="5" fill="white" />
                <line x1="140" y1="46" x2="190" y2="20" /> <circle cx="200" cy="50" r="5" fill="white" />
                <line x1="200" y1="50" x2="300" y2="50" />

                <line x1="50" y1="250" x2="300" y2="250" />

                <circle cx="300" cy="50" r="4" fill="#2d3748" /> <line x1="300" y1="50" x2="300" y2="80" />
                <rect x="280" y="80" width="40" height="50" fill="white" />
                <text x="330" y="110" fill="#2d3748" stroke="none" font-size="16" font-family="sans-serif" font-weight="bold" id="svg-r1">10kΩ</text>

                <line x1="300" y1="130" x2="300" y2="170" />
                <circle cx="300" cy="150" r="4" fill="#2d3748" /> <rect x="280" y="170" width="40" height="50" fill="white" />
                <text x="330" y="200" fill="#2d3748" stroke="none" font-size="16" font-family="sans-serif" font-weight="bold" id="svg-r2">4.7kΩ</text>
                
                <line x1="300" y1="220" x2="300" y2="250" />
                <circle cx="300" cy="250" r="4" fill="#2d3748" /> <line x1="300" y1="50" x2="370" y2="50" />
                <circle cx="370" cy="50" r="5" fill="white" />
                <text x="385" y="55" fill="#4a5568" stroke="none" font-size="14" font-family="sans-serif">Point C</text>

                <line x1="300" y1="150" x2="370" y2="150" />
                <circle cx="370" cy="150" r="5" fill="white" />
                <text x="385" y="145" fill="#4a5568" stroke="none" font-size="14" font-family="sans-serif">Point B</text>
                <text x="385" y="165" fill="#e53e3e" stroke="none" font-size="18" font-family="sans-serif" font-weight="bold" id="svg-vout">2.88V</text>

                <line x1="300" y1="250" x2="370" y2="250" />
                <circle cx="370" cy="250" r="5" fill="white" />
                <text x="385" y="255" fill="#4a5568" stroke="none" font-size="14" font-family="sans-serif">Point A (0V)</text>
            </svg>
        </div>

        <div class="control-group">
            <label>Supply Voltage (Vin) <span id="vin-val" class="val-display">9V</span></label>
            <input type="range" id="vin" min="1" max="24" value="9" step="0.5">
        </div>

        <div class="control-group">
            <label>Resistor 1 (R1) <span id="r1-val" class="val-display">10kΩ</span></label>
            <input type="range" id="r1" min="1" max="100" value="10" step="0.1">
        </div>

        <div class="control-group">
            <label>Resistor 2 (R2) <span id="r2-val" class="val-display">4.7kΩ</span></label>
            <input type="range" id="r2" min="1" max="100" value="4.7" step="0.1">
        </div>

        <div class="output-box">
            <div>Vout = Vin × [ R2 / (R1 + R2) ]</div>
            <div id="vout-display" class="output-value">2.88 V</div>
        </div>
    </div>

    <script>
        // HTML Input elements
        const vinInput = document.getElementById('vin');
        const r1Input = document.getElementById('r1');
        const r2Input = document.getElementById('r2');
        
        // HTML Text elements (Sliders)
        const vinVal = document.getElementById('vin-val');
        const r1Val = document.getElementById('r1-val');
        const r2Val = document.getElementById('r2-val');
        const voutDisplay = document.getElementById('vout-display');

        // SVG Text elements (The diagram!)
        const svgVin = document.getElementById('svg-vin');
        const svgR1 = document.getElementById('svg-r1');
        const svgR2 = document.getElementById('svg-r2');
        const svgVout = document.getElementById('svg-vout');

        function calculateVoltage() {
            // 1. Get current values
            const vin = parseFloat(vinInput.value);
            const r1 = parseFloat(r1Input.value) * 1000; 
            const r2 = parseFloat(r2Input.value) * 1000;

            // 2. Do the math
            const vout = vin * (r2 / (r1 + r2));
            const voutFormatted = vout.toFixed(2) + 'V';

            // 3. Update the UI text above the sliders
            vinVal.textContent = vin + 'V';
            r1Val.textContent = r1Input.value + 'kΩ';
            r2Val.textContent = r2Input.value + 'kΩ';
            voutDisplay.textContent = voutFormatted;

            // 4. Update the text INSIDE the drawing!
            svgVin.textContent = vin + 'V';
            svgR1.textContent = r1Input.value + 'kΩ';
            svgR2.textContent = r2Input.value + 'kΩ';
            svgVout.textContent = voutFormatted;
        }

        // Listen for slider movement
        vinInput.addEventListener('input', calculateVoltage);
        r1Input.addEventListener('input', calculateVoltage);
        r2Input.addEventListener('input', calculateVoltage);

        // Run once on load
        calculateVoltage();
    </script>
</body>
</html>
