<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WJEC Mixed Circuit Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 1.5rem;
            margin-top: 0;
        }
        .diagram-container {
            background: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px 0;
            margin-bottom: 20px;
            text-align: center;
            overflow: visible;
        }
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .control-group {
            background: #f8fafc;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        label {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 5px;
            color: #4a5568;
            font-size: 0.9rem;
        }
        input[type=range] { width: 100%; cursor: pointer; }
        .val-display { color: #3182ce; }
        
        .answers-box {
            background: #edf2f7;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed #a0aec0;
        }
        .answers-box h3 { margin-top: 0; color: #2d3748; font-size: 1.1rem;}
        .answer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .ans-item { font-size: 1.1rem; }
        .ans-val { font-weight: bold; color: #e53e3e; }
        
        button {
            width: 100%;
            padding: 10px;
            background-color: #3182ce;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 15px;
            font-weight: bold;
        }
        button:hover { background-color: #2b6cb0; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>WJEC Problem Generator</h1>

        <div class="diagram-container">
            <svg viewBox="0 0 450 400" width="100%" height="300" xmlns="http://www.w3.org/2000/svg" stroke="#2d3748" stroke-width="2" fill="none">
                <defs>
                    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d3748" stroke="none"/>
                    </marker>
                    <marker id="arrow-up" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="270">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d3748" stroke="none"/>
                    </marker>
                    <marker id="arrow-down" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="90">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d3748" stroke="none"/>
                    </marker>
                </defs>

                <circle cx="70" cy="50" r="4" fill="white" stroke="#2d3748" stroke-width="2"/>
                <text x="35" y="55" fill="#2d3748" stroke="none" font-size="16" font-family="sans-serif" font-weight="bold" id="svg-vsupply">6 V</text>
                <line x1="74" y1="50" x2="330" y2="50" />
                
                <circle cx="150" cy="50" r="4" fill="#2d3748" />
                <circle cx="240" cy="220" r="4" fill="#2d3748" />

                <line x1="150" y1="50" x2="150" y2="100" marker-start="url(#arrow-down)" />
                <rect x="140" y="100" width="20" height="60" fill="white" />
                <line x1="150" y1="160" x2="150" y2="220" />
                
                <text x="160" y="70" fill="#2d3748" stroke="none" font-size="14" font-family="sans-serif">I₁ = <tspan id="svg-i1">2mA</tspan></text>
                <line x1="120" y1="160" x2="120" y2="100" marker-end="url(#arrow-up)" stroke-width="1"/>
                <text x="75" y="135" fill="#2d3748" stroke="none" font-size="14" font-family="sans-serif">V₁ = <tspan id="svg-v1">1V</tspan></text>

                <line x1="330" y1="50" x2="330" y2="100" marker-start="url(#arrow-down)"/>
                <rect x="320" y="100" width="20" height="60" fill="white" />
                <line x1="330" y1="160" x2="330" y2="220" />
                
                <text x="340" y="70" fill="#2d3748" stroke="none" font-size="14" font-family="sans-serif">I₂ = <tspan id="svg-i2">6mA</tspan></text>
                <line x1="350" y1="160" x2="350" y2="100" marker-end="url(#arrow-up)" stroke-width="1"/>
                <text x="360" y="135" fill="#e53e3e" stroke="none" font-size="14" font-family="sans-serif" font-weight="bold" class="ans-text">V₂ = <tspan id="svg-v2">?</tspan></text>

                <line x1="150" y1="220" x2="330" y2="220" />

                <line x1="240" y1="220" x2="240" y2="270" marker-start="url(#arrow-down)"/>
                <rect x="230" y="270" width="20" height="60" fill="white" />
                <line x1="240" y1="330" x2="240" y2="380" />

                <text x="250" y="245" fill="#e53e3e" stroke="none" font-size="14" font-family="sans-serif" font-weight="bold" class="ans-text">I₃ = <tspan id="svg-i3">?</tspan></text>
                <line x1="260" y1="330" x2="260" y2="270" marker-end="url(#arrow-up)" stroke-width="1"/>
                <text x="270" y="305" fill="#e53e3e" stroke="none" font-size="14" font-family="sans-serif" font-weight="bold" class="ans-text">V₃ = <tspan id="svg-v3">?</tspan></text>

                <line x1="240" y1="380" x2="74" y2="380" />
                <line x1="170" y1="380" x2="150" y2="380" marker-end="url(#arrow)" stroke-width="2"/> <circle cx="70" cy="380" r="4" fill="white" stroke="#2d3748" stroke-width="2"/>
                
                <text x="35" y="385" fill="#2d3748" stroke="none" font-size="16" font-family="sans-serif" font-weight="bold">0 V</text>
                <text x="145" y="370" fill="#e53e3e" stroke="none" font-size="14" font-family="sans-serif" font-weight="bold" class="ans-text">I₄ = <tspan id="svg-i4">?</tspan></text>

            </svg>
        </div>

        <div class="controls-grid">
            <div class="control-group">
                <label>Supply Voltage <span id="vsupply-val" class="val-display">6V</span></label>
                <input type="range" id="vsupply" min="2" max="24" value="6" step="1">
            </div>
            <div class="control-group">
                <label>Voltage V₁ <span id="v1-val" class="val-display">1V</span></label>
                <input type="range" id="v1" min="0.5" max="12" value="1" step="0.5">
            </div>
            <div class="control-group">
                <label>Current I₁ <span id="i1-val" class="val-display">2mA</span></label>
                <input type="range" id="i1" min="1" max="20" value="2" step="1">
            </div>
            <div class="control-group">
                <label>Current I₂ <span id="i2-val" class="val-display">6mA</span></label>
                <input type="range" id="i2" min="1" max="20" value="6" step="1">
            </div>
        </div>

        <button onclick="toggleAnswers()" id="toggle-btn">Reveal Exam Answers</button>

        <div class="answers-box hidden" id="answers-box">
            <h3>Calculated Answers</h3>
            <div class="answer-grid">
                <div class="ans-item">(a) V₂ = <span id="ans-v2" class="ans-val">-</span> V</div>
                <div class="ans-item">(b) I₃ = <span id="ans-i3" class="ans-val">-</span> mA</div>
                <div class="ans-item">(c) V₃ = <span id="ans-v3" class="ans-val">-</span> V</div>
                <div class="ans-item">(d) I₄ = <span id="ans-i4" class="ans-val">-</span> mA</div>
            </div>
        </div>
    </div>

    <script>
        const inputs = ['vsupply', 'v1', 'i1', 'i2'];
        let showingAnswers = false;

        function updateCircuit() {
            // 1. Get Values
            const vsupply = parseFloat(document.getElementById('vsupply').value);
            const v1 = parseFloat(document.getElementById('v1').value);
            const i1 = parseFloat(document.getElementById('i1').value);
            const i2 = parseFloat(document.getElementById('i2').value);

            // Prevent V1 from being higher than Supply Voltage (physically impossible here)
            if (v1 >= vsupply) {
                document.getElementById('v1').value = vsupply - 0.5;
                return updateCircuit(); // Recalculate
            }

            // 2. Calculate Exam Answers (Kirchhoff's Laws)
            const v2 = v1;                  // Components in parallel share voltage
            const i3 = i1 + i2;             // Currents combine at the node
            const v3 = vsupply - v1;        // Remaining voltage drops across series resistor
            const i4 = i3;                  // Current returning to source equals current through R3

            // 3. Update Input Labels
            document.getElementById('vsupply-val').textContent = vsupply + 'V';
            document.getElementById('v1-val').textContent = v1 + 'V';
            document.getElementById('i1-val').textContent = i1 + 'mA';
            document.getElementById('i2-val').textContent = i2 + 'mA';

            // 4. Update SVG Knowns
            document.getElementById('svg-vsupply').textContent = vsupply + ' V';
            document.getElementById('svg-v1').textContent = v1 + 'V';
            document.getElementById('svg-i1').textContent = i1 + 'mA';
            document.getElementById('svg-i2').textContent = i2 + 'mA';

            // 5. Update Answers Box
            document.getElementById('ans-v2').textContent = v2;
            document.getElementById('ans-i3').textContent = i3;
            document.getElementById('ans-v3').textContent = v3;
            document.getElementById('ans-i4').textContent = i4;

            // 6. Update SVG Answers (if revealed)
            if (showingAnswers) {
                document.getElementById('svg-v2').textContent = v2 + 'V';
                document.getElementById('svg-i3').textContent = i3 + 'mA';
                document.getElementById('svg-v3').textContent = v3 + 'V';
                document.getElementById('svg-i4').textContent = i4 + 'mA';
            } else {
                document.getElementById('svg-v2').textContent = '?';
                document.getElementById('svg-i3').textContent = '?';
                document.getElementById('svg-v3').textContent = '?';
                document.getElementById('svg-i4').textContent = '?';
            }
        }

        function toggleAnswers() {
            showingAnswers = !showingAnswers;
            const box = document.getElementById('answers-box');
            const btn = document.getElementById('toggle-btn');
            
            if (showingAnswers) {
                box.classList.remove('hidden');
                btn.textContent = 'Hide Exam Answers';
            } else {
                box.classList.add('hidden');
                btn.textContent = 'Reveal Exam Answers';
            }
            updateCircuit();
        }

        // Add event listeners
        inputs.forEach(id => {
            document.getElementById(id).addEventListener('input', updateCircuit);
        });

        // Initial run
        updateCircuit();
    </script>

</body>
</html>
