<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abingdon School - Electronics Revision</title>
    <style>
        :root {
            /* Abingdon School Brand Colors */
            --abingdon-cerise: #B30059;
            --abingdon-cerise-dark: #8A0045;
            --abingdon-navy: #001f3f;
            --abingdon-navy-light: #003366;
            --bg-light: #f4f6f8;
            --text-dark: #2d3748;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header-container { text-align: center; margin-bottom: 20px; }
        
        h1 { 
            color: var(--abingdon-navy); 
            margin-bottom: 5px; 
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .subtitle {
            color: var(--abingdon-cerise);
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 0;
        }
        
        /* Scoreboard Styles */
        .scoreboard {
            background: #fff;
            padding: 15px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border: 2px solid var(--abingdon-cerise);
        }
        .score-text { font-size: 1.5rem; font-weight: bold; color: var(--abingdon-navy); margin: 0; }
        .score-numbers { color: var(--abingdon-cerise); }
        .download-btn {
            background: var(--abingdon-navy);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: background 0.3s;
        }
        .download-btn:hover { background: var(--abingdon-navy-light); }

        /* Tab Navigation */
        .tab-nav {
            display: flex;
            flex-wrap: wrap;
            background: #e2e8f0;
            border-radius: 8px 8px 0 0;
            overflow: hidden;
            margin-bottom: 0;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: bold;
            color: #4a5568;
            font-size: 0.95rem;
            transition: background 0.3s, color 0.3s;
            min-width: 120px;
        }
        .tab-btn:hover { background: #cbd5e0; }
        .tab-btn.active { 
            background: white; 
            color: var(--abingdon-cerise); 
            border-bottom: 3px solid var(--abingdon-cerise); 
        }
        
        /* Content Areas */
        .tab-content {
            display: none;
            background: white;
            padding: 30px;
            border-radius: 0 0 8px 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .tab-content.active { display: block; }
        
        /* Layout Elements */
        .diagram-box {
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            background: #fff;
        }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
        }
        .control-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; color: #4a5568; font-size: 0.9rem;}
        input[type="number"], input[type="range"] { padding: 8px; border: 1px solid #cbd5e0; border-radius: 4px; outline-color: var(--abingdon-cerise); }
        
        /* Buttons */
        .action-btn {
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            width: 100%;
            margin-bottom: 10px;
            transition: background 0.3s, color 0.3s;
        }
        .action-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .check-btn { background: var(--abingdon-cerise); color: white; }
        .check-btn:hover:not(:disabled) { background: var(--abingdon-cerise-dark); }
        
        .new-btn { background: var(--abingdon-navy); color: white; }
        .new-btn:hover:not(:disabled) { background: var(--abingdon-navy-light); }
        
        .reveal-btn { background: #e2e8f0; color: #4a5568; border: 1px solid #cbd5e0; }
        .reveal-btn:hover:not(:disabled) { background: #cbd5e0; color: var(--abingdon-navy); }
        
        /* Feedback Boxes */
        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 6px;
            text-align: left;
            font-size: 1rem;
            display: none;
        }
        .feedback.correct { background: #c6f6d5; color: #22543d; display: block; border-left: 4px solid #48bb78; font-weight: bold; text-align: center;}
        .feedback.incorrect { background: #fed7d7; color: #822727; display: block; border-left: 4px solid #f56565; font-weight: bold; text-align: center;}
        .feedback.solution { background: #e6f0fa; color: #001f3f; display: block; border-left: 4px solid var(--abingdon-navy); }

        svg { max-width: 100%; height: auto; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>Abingdon School</h1>
        <p class="subtitle">GCSE Electronics Interactive Revision</p>
    </div>

    <div class="scoreboard">
        <p class="score-text">Score: <span id="score-display" class="score-numbers">0 / 0</span></p>
        <button class="download-btn" onclick="downloadImageScore()">🖼️ Download Report</button>
    </div>

    <div class="tab-nav">
        <button class="tab-btn active" onclick="openTab(event, 'tab-mixed')">Mixed Circuit</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-led')">LED Resistor</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-ldr')">LDR Divider</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-opamp')">Op-Amp Gain</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-logic')">Logic Gates</button>
    </div>

    <div id="tab-mixed" class="tab-content active">
        <h2>Mixed Series-Parallel Circuit</h2>
        <div class="diagram-box">
            <svg viewBox="0 0 450 400" width="100%" height="300" stroke="#001f3f" stroke-width="2" fill="none">
                <defs>
                    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#001f3f" stroke="none"/></marker>
                    <marker id="arrow-up" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="270"><path d="M 0 0 L 10 5 L 0 10 z" fill="#001f3f" stroke="none"/></marker>
                    <marker id="arrow-down" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="90"><path d="M 0 0 L 10 5 L 0 10 z" fill="#001f3f" stroke="none"/></marker>
                </defs>
                <circle cx="70" cy="50" r="4" fill="white" stroke="#001f3f"/>
                <text x="35" y="55" fill="#001f3f" stroke="none" font-weight="bold" id="mixed-vs">6V</text>
                <line x1="74" y1="50" x2="330" y2="50" />
                <circle cx="150" cy="50" r="4" fill="#001f3f" />
                <circle cx="240" cy="220" r="4" fill="#001f3f" />
                <line x1="150" y1="50" x2="150" y2="100" marker-start="url(#arrow-down)" />
                <rect x="140" y="100" width="20" height="60" fill="white" />
                <line x1="150" y1="160" x2="150" y2="220" />
                <text x="160" y="70" fill="#001f3f" stroke="none">I₁ = <tspan id="mixed-i1">2mA</tspan></text>
                <line x1="120" y1="160" x2="120" y2="100" marker-end="url(#arrow-up)" stroke-width="1"/>
                <text x="75" y="135" fill="#001f3f" stroke="none">V₁ = <tspan id="mixed-v1">1V</tspan></text>
                <line x1="330" y1="50" x2="330" y2="100" marker-start="url(#arrow-down)"/>
                <rect x="320" y="100" width="20" height="60" fill="white" />
                <line x1="330" y1="160" x2="330" y2="220" />
                <text x="340" y="70" fill="#001f3f" stroke="none">I₂ = <tspan id="mixed-i2">6mA</tspan></text>
                <line x1="350" y1="160" x2="350" y2="100" marker-end="url(#arrow-up)" stroke-width="1"/>
                <text x="360" y="135" fill="#B30059" stroke="none" font-weight="bold">V₂ = ?</text>
                <line x1="150" y1="220" x2="330" y2="220" />
                <line x1="240" y1="220" x2="240" y2="270" marker-start="url(#arrow-down)"/>
                <rect x="230" y="270" width="20" height="60" fill="white" />
                <line x1="240" y1="330" x2="240" y2="380" />
                <text x="250" y="245" fill="#B30059" stroke="none" font-weight="bold">I₃ = ?</text>
                <line x1="260" y1="330" x2="260" y2="270" marker-end="url(#arrow-up)" stroke-width="1"/>
                <text x="270" y="305" fill="#B30059" stroke="none" font-weight="bold">V₃ = ?</text>
                <line x1="240" y1="380" x2="74" y2="380" />
                <line x1="170" y1="380" x2="150" y2="380" marker-end="url(#arrow)" />
                <circle cx="70" cy="380" r="4" fill="white" stroke="#001f3f"/>
                <text x="35" y="385" fill="#001f3f" stroke="none" font-weight="bold">0V</text>
                <text x="145" y="370" fill="#B30059" stroke="none" font-weight="bold">I₄ = ?</text>
            </svg>
        </div>
        <div class="controls">
            <div class="control-group"><label>(a) V₂ (Volts):</label><input type="number" id="ans-mixed-v2" step="0.1"></div>
            <div class="control-group"><label>(b) I₃ (mA):</label><input type="number" id="ans-mixed-i3" step="0.1"></div>
            <div class="control-group"><label>(c) V₃ (Volts):</label><input type="number" id="ans-mixed-v3" step="0.1"></div>
            <div class="control-group"><label>(d) I₄ (mA):</label><input type="number" id="ans-mixed-i4" step="0.1"></div>
        </div>
        <button class="action-btn check-btn" id="btn-check-mixed" onclick="checkMixed()">Check All Answers</button>
        <button class="action-btn reveal-btn" id="btn-reveal-mixed" onclick="revealMixed()">Need Help? (Show Solution)</button>
        <button class="action-btn new-btn" onclick="generateMixed()">Generate New Problem</button>
        <div id="feedback-mixed" class="feedback"></div>
    </div>

    <div id="tab-led" class="tab-content">
        <h2>Calculate the Protective Resistor</h2>
        <div class="diagram-box">
            <svg viewBox="0 0 400 200" width="400" height="200" stroke="#001f3f" stroke-width="2" fill="none">
                <circle cx="50" cy="100" r="20" fill="white"/>
                <text x="50" y="105" text-anchor="middle" stroke="none" fill="#001f3f" font-weight="bold" id="led-vs-txt">9V</text>
                <line x1="70" y1="100" x2="120" y2="100"/>
                <line x1="180" y1="100" x2="250" y2="100"/>
                <line x1="310" y1="100" x2="350" y2="100"/>
                <line x1="350" y1="100" x2="350" y2="150"/>
                <line x1="350" y1="150" x2="50" y2="150"/>
                <line x1="50" y1="150" x2="50" y2="120"/>
                <rect x="120" y="85" width="60" height="30" fill="white"/>
                <text x="150" y="75" text-anchor="middle" stroke="none" fill="#B30059" font-weight="bold">R = ?</text>
                <polygon points="250,85 250,115 290,100" fill="white"/>
                <line x1="290" y1="85" x2="290" y2="115"/>
                <circle cx="270" cy="100" r="25"/>
                <text x="270" y="65" text-anchor="middle" stroke="none" fill="#001f3f" id="led-vf-txt">Vf: 2V</text>
                <text x="200" y="140" text-anchor="middle" stroke="none" fill="#001f3f" font-weight="bold" id="led-i-txt">Target Current: 20mA</text>
            </svg>
        </div>
        <div class="controls">
            <div class="control-group" style="grid-column: span 2;">
                <label>Your Answer for R (Ohms):</label>
                <input type="number" id="ans-led" placeholder="e.g. 330">
            </div>
        </div>
        <button class="action-btn check-btn" id="btn-check-led" onclick="checkLED()">Check Answer</button>
        <button class="action-btn reveal-btn" id="btn-reveal-led" onclick="revealLED()">Need Help? (Show Solution)</button>
        <button class="action-btn new-btn" onclick="generateLED()">Generate New Problem</button>
        <div id="feedback-led" class="feedback"></div>
    </div>

    <div id="tab-ldr" class="tab-content">
        <h2>Light Sensor Voltage</h2>
        <div class="diagram-box">
            <svg viewBox="0 0 400 300" width="400" height="300" stroke="#001f3f" stroke-width="2" fill="none">
                <line x1="100" y1="50" x2="250" y2="50"/>
                <text x="70" y="55" stroke="none" fill="#001f3f" font-weight="bold" id="ldr-vs-txt">5V</text>
                <line x1="200" y1="50" x2="200" y2="90"/>
                <rect x="180" y="90" width="40" height="60" fill="white"/>
                <text x="230" y="125" stroke="none" fill="#001f3f" id="ldr-r1-txt">R1: 4.7kΩ</text>
                <line x1="200" y1="150" x2="200" y2="190"/>
                <circle cx="200" cy="170" r="4" fill="#001f3f"/>
                <line x1="200" y1="170" x2="280" y2="170"/>
                <text x="290" y="175" stroke="none" fill="#B30059" font-weight="bold">Vout = ?</text>
                <rect x="180" y="190" width="40" height="60" fill="white"/>
                <circle cx="200" cy="220" r="35"/>
                <text x="245" y="225" stroke="none" fill="#001f3f" font-weight="bold" id="ldr-r2-txt">LDR: 10kΩ</text>
                <line x1="200" y1="250" x2="200" y2="280"/>
                <line x1="100" y1="280" x2="250" y2="280"/>
                <text x="70" y="285" stroke="none" fill="#001f3f" font-weight="bold">0V</text>
            </svg>
        </div>
        <div class="controls">
            <div class="control-group">
                <label>Light Level Slider (Changes LDR resistance):</label>
                <input type="range" id="ldr-slider" min="1" max="10" value="1" oninput="updateLDR()">
            </div>
            <div class="control-group">
                <label>Your Answer for Vout (V):</label>
                <input type="number" id="ans-ldr" step="0.1">
            </div>
        </div>
        <button class="action-btn check-btn" id="btn-check-ldr" onclick="checkLDR()">Check Answer</button>
        <button class="action-btn reveal-btn" id="btn-reveal-ldr" onclick="revealLDR()">Need Help? (Show Solution)</button>
        <button class="action-btn new-btn" onclick="generateLDR()">Generate New Fixed Resistor</button>
        <div id="feedback-ldr" class="feedback"></div>
    </div>

    <div id="tab-opamp" class="tab-content">
        <h2>Inverting Amplifier</h2>
        <div class="diagram-box">
            <svg viewBox="0 0 400 200" width="400" height="200" stroke="#001f3f" stroke-width="2" fill="none">
                <polygon points="180,60 180,140 280,100" fill="white"/>
                <text x="190" y="90" stroke="none" fill="#001f3f" font-weight="bold">-</text>
                <text x="190" y="125" stroke="none" fill="#001f3f" font-weight="bold">+</text>
                <line x1="50" y1="85" x2="80" y2="85"/>
                <text x="20" y="90" stroke="none" fill="#001f3f" font-weight="bold" id="op-vin-txt">0.5V</text>
                <rect x="80" y="70" width="40" height="30" fill="white"/>
                <text x="80" y="60" stroke="none" fill="#001f3f" id="op-rin-txt">Rin: 10k</text>
                <line x1="120" y1="85" x2="180" y2="85"/>
                <circle cx="150" cy="85" r="3" fill="#001f3f"/>
                <line x1="150" y1="85" x2="150" y2="30"/>
                <line x1="150" y1="30" x2="180" y2="30"/>
                <rect x="180" y="15" width="60" height="30" fill="white"/>
                <text x="180" y="10" stroke="none" fill="#001f3f" id="op-rf-txt">Rf: 100k</text>
                <line x1="240" y1="30" x2="320" y2="30"/>
                <line x1="320" y1="30" x2="320" y2="100"/>
                <circle cx="320" cy="100" r="3" fill="#001f3f"/>
                <line x1="140" y1="120" x2="180" y2="120"/>
                <line x1="140" y1="120" x2="140" y2="150"/>
                <line x1="130" y1="150" x2="150" y2="150"/>
                <line x1="135" y1="155" x2="145" y2="155"/>
                <line x1="280" y1="100" x2="360" y2="100"/>
                <text x="370" y="105" stroke="none" fill="#B30059" font-weight="bold">Vout = ?</text>
            </svg>
        </div>
        <div class="controls">
            <div class="control-group" style="grid-column: span 2;">
                <label>Your Answer for Vout (V):</label>
                <input type="number" id="ans-opamp" step="0.1" placeholder="-1.5">
            </div>
        </div>
        <button class="action-btn check-btn" id="btn-check-opamp" onclick="checkOpAmp()">Check Answer</button>
        <button class="action-btn reveal-btn" id="btn-reveal-opamp" onclick="revealOpAmp()">Need Help? (Show Solution)</button>
        <button class="action-btn new-btn" onclick="generateOpAmp()">Generate New Problem</button>
        <div id="feedback-opamp" class="feedback"></div>
    </div>

    <div id="tab-logic" class="tab-content">
        <h2>Combinational Logic</h2>
        <div class="diagram-box">
            <svg viewBox="0 0 400 200" width="400" height="200" stroke="#001f3f" stroke-width="2" fill="none">
                <path d="M 120 40 L 150 40 A 30 30 0 0 1 150 100 L 120 100 Z" fill="white"/>
                <text x="130" y="75" stroke="none" fill="#001f3f" font-size="12">AND</text>
                <line x1="60" y1="55" x2="120" y2="55"/>
                <line x1="60" y1="85" x2="120" y2="85"/>
                <text x="40" y="60" stroke="none" fill="#001f3f" font-weight="bold" id="log-a-txt">A: 1</text>
                <text x="40" y="90" stroke="none" fill="#001f3f" font-weight="bold" id="log-b-txt">B: 0</text>
                <path d="M 240 80 Q 260 80 280 110 Q 260 140 240 140 Q 255 110 240 80 Z" fill="white"/>
                <text x="250" y="115" stroke="none" fill="#001f3f" font-size="12">OR</text>
                <line x1="180" y1="70" x2="220" y2="70"/>
                <line x1="220" y1="70" x2="220" y2="95"/>
                <line x1="220" y1="95" x2="245" y2="95"/>
                <line x1="60" y1="125" x2="245" y2="125"/>
                <text x="40" y="130" stroke="none" fill="#001f3f" font-weight="bold" id="log-c-txt">C: 1</text>
                <line x1="280" y1="110" x2="340" y2="110"/>
                <text x="350" y="115" stroke="none" fill="#B30059" font-weight="bold">Y = ?</text>
            </svg>
        </div>
        <div class="controls">
            <div class="control-group" style="grid-column: span 2;">
                <label>Your Answer for Output Y (0 or 1):</label>
                <input type="number" id="ans-logic" min="0" max="1" placeholder="0 or 1">
            </div>
        </div>
        <button class="action-btn check-btn" id="btn-check-logic" onclick="checkLogic()">Check Answer</button>
        <button class="action-btn reveal-btn" id="btn-reveal-logic" onclick="revealLogic()">Need Help? (Show Solution)</button>
        <button class="action-btn new-btn" onclick="generateLogic()">Randomize Inputs</button>
        <div id="feedback-logic" class="feedback"></div>
    </div>

    <script>
        // --- SCORE TRACKING OBJECT ---
        const scores = {
            mixed: { name: "Mixed Circuit", correct: 0, attempts: 0 },
            led:   { name: "LED Resistor", correct: 0, attempts: 0 },
            ldr:   { name: "LDR Divider", correct: 0, attempts: 0 },
            opamp: { name: "Op-Amp Gain", correct: 0, attempts: 0 },
            logic: { name: "Logic Gates", correct: 0, attempts: 0 }
        };
        
        let solvedState = { mixed: false, led: false, ldr: false, opamp: false, logic: false };

        function updateScoreboard() {
            let totalC = 0, totalA = 0;
            for (let key in scores) {
                totalC += scores[key].correct;
                totalA += scores[key].attempts;
            }
            document.getElementById('score-display').textContent = `${totalC} / ${totalA}`;
        }

        function downloadImageScore() {
            const studentName = prompt("Enter your name for the Score Report:");
            if (studentName === null) return; 
            const displayName = studentName.trim() || "Student";

            const canvas = document.createElement('canvas');
            canvas.width = 500;
            canvas.height = 430; 
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = "#f4f6f8"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#001f3f"; ctx.fillRect(0, 0, canvas.width, 90);

            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 28px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("ABINGDON SCHOOL", 250, 40);
            
            ctx.fillStyle = "#B30059"; 
            ctx.font = "bold 18px sans-serif";
            ctx.fillText("GCSE Electronics Revision Report", 250, 68);

            ctx.fillStyle = "#001f3f";
            ctx.textAlign = "left";
            ctx.font = "bold 20px sans-serif";
            ctx.fillText("Name: " + displayName, 40, 130);
            ctx.font = "16px sans-serif";
            ctx.fillText("Date: " + new Date().toLocaleDateString(), 40, 155);

            ctx.fillStyle = "#4a5568";
            ctx.font = "18px monospace";
            let yPos = 200;
            let totalC = 0, totalA = 0;

            for (let key in scores) {
                let sec = scores[key];
                totalC += sec.correct;
                totalA += sec.attempts;
                ctx.fillText(sec.name.padEnd(20, ' ') + ` :  ${sec.correct} / ${sec.attempts}`, 60, yPos);
                yPos += 30;
            }

            ctx.fillStyle = "#B30059";
            ctx.font = "bold 22px sans-serif";
            ctx.fillText(`Overall Score: ${totalC} / ${totalA}`, 40, yPos + 35);

            const link = document.createElement('a');
            link.download = `Abingdon_Electronics_${displayName.replace(/[^a-z0-9]/gi, '_')}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        }

        // --- TAB NAVIGATION & FEEDBACK LOGIC ---
        function openTab(evt, tabName) {
            const contents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < contents.length; i++) contents[i].classList.remove("active"); 
            const buttons = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < buttons.length; i++) buttons[i].classList.remove("active");
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        function showFeedback(id, isCorrect, message) {
            const el = document.getElementById(id);
            el.className = 'feedback ' + (isCorrect ? 'correct' : 'incorrect');
            el.innerHTML = message;
        }

        function showSolution(id, message) {
            const el = document.getElementById(id);
            el.className = 'feedback solution';
            el.innerHTML = message;
        }

        // --- LOGIC FUNCTIONS ---
        // TAB 0: Mixed Circuit
        let currentMixed = {};
        function generateMixed() {
            solvedState.mixed = false;
            document.getElementById('btn-check-mixed').disabled = false;
            document.getElementById('btn-reveal-mixed').disabled = false;
            currentMixed.vs = Math.floor(Math.random() * 8) + 5; 
            currentMixed.v1 = Math.floor(Math.random() * (currentMixed.vs - 2)) + 1;
            currentMixed.i1 = Math.floor(Math.random() * 9) + 2;
            currentMixed.i2 = Math.floor(Math.random() * 9) + 2;
            
            document.getElementById('mixed-vs').textContent = currentMixed.vs + 'V';
            document.getElementById('mixed-v1').textContent = currentMixed.v1 + 'V';
            document.getElementById('mixed-i1').textContent = currentMixed.i1 + 'mA';
            document.getElementById('mixed-i2').textContent = currentMixed.i2 + 'mA';
            document.getElementById('feedback-mixed').style.display = 'none';
            document.getElementById('ans-mixed-v2').value = '';
            document.getElementById('ans-mixed-i3').value = '';
            document.getElementById('ans-mixed-v3').value = '';
            document.getElementById('ans-mixed-i4').value = '';
        }
        function checkMixed() {
            if (solvedState.mixed) return;
            const uV2 = parseFloat(document.getElementById('ans-mixed-v2').value);
            const uI3 = parseFloat(document.getElementById('ans-mixed-i3').value);
            const uV3 = parseFloat(document.getElementById('ans-mixed-v3').value);
            const uI4 = parseFloat(document.getElementById('ans-mixed-i4').value);
            if(isNaN(uV2) || isNaN(uI3) || isNaN(uV3) || isNaN(uI4)) return alert("Please fill in all answers.");

            scores.mixed.attempts++;
            if (uV2 === currentMixed.v1 && uI3 === (currentMixed.i1 + currentMixed.i2) && uV3 === (currentMixed.vs - currentMixed.v1) && uI4 === (currentMixed.i1 + currentMixed.i2)) {
                scores.mixed.correct++;
                solvedState.mixed = true;
                document.getElementById('btn-check-mixed').disabled = true;
                document.getElementById('btn-reveal-mixed').disabled = true;
                showFeedback('feedback-mixed', true, `All correct! Excellent application of Kirchhoff's Laws.`);
            } else {
                showFeedback('feedback-mixed', false, `Not quite. Remember:<br>Parallel branches share voltage (V₂ = V₁).<br>Currents sum at a junction (I₃ = I₁ + I₂).<br>Series voltages sum to the supply (V₃ = Supply - V₁).`);
            }
            updateScoreboard();
        }
        function revealMixed() {
            if (solvedState.mixed) return;
            solvedState.mixed = true; // Lock scoring
            document.getElementById('btn-check-mixed').disabled = true;
            document.getElementById('btn-reveal-mixed').disabled = true;
            
            const cV2 = currentMixed.v1;
            const cI3 = currentMixed.i1 + currentMixed.i2;
            const cV3 = currentMixed.vs - currentMixed.v1;
            const cI4 = cI3;
            
            document.getElementById('ans-mixed-v2').value = cV2;
            document.getElementById('ans-mixed-i3').value = cI3;
            document.getElementById('ans-mixed-v3').value = cV3;
            document.getElementById('ans-mixed-i4').value = cI4;

            const msg = `<strong>Worked Solution:</strong> (Scoring disabled for this problem)<br><br>
            (a) Parallel branches share the same voltage. V₂ = V₁ = <strong>${cV2}V</strong>.<br>
            (b) Currents sum at a junction. I₃ = I₁ + I₂ = ${currentMixed.i1} + ${currentMixed.i2} = <strong>${cI3}mA</strong>.<br>
            (c) Series voltages sum to the supply. V₃ = Supply - V₁ = ${currentMixed.vs} - ${currentMixed.v1} = <strong>${cV3}V</strong>.<br>
            (d) Total current must return to the source. I₄ = I₃ = <strong>${cI4}mA</strong>.`;
            showSolution('feedback-mixed', msg);
        }

        // TAB 1: LED 
        let currentLED = {};
        function generateLED() {
            solvedState.led = false;
            document.getElementById('btn-check-led').disabled = false;
            document.getElementById('btn-reveal-led').disabled = false;
            currentLED.vs = Math.floor(Math.random() * 8) + 5; 
            currentLED.vf = (Math.random() * 1.4 + 1.8).toFixed(1);
            currentLED.i = Math.floor(Math.random() * 11) + 10;
            document.getElementById('led-vs-txt').textContent = currentLED.vs + 'V';
            document.getElementById('led-vf-txt').textContent = 'Vf: ' + currentLED.vf + 'V';
            document.getElementById('led-i-txt').textContent = 'Target: ' + currentLED.i + 'mA';
            document.getElementById('feedback-led').style.display = 'none';
            document.getElementById('ans-led').value = '';
        }
        function checkLED() {
            if (solvedState.led) return; 
            const userAns = parseFloat(document.getElementById('ans-led').value);
            if(isNaN(userAns)) return;
            
            scores.led.attempts++;
            const correctR = ((currentLED.vs - currentLED.vf) / (currentLED.i / 1000));
            if (Math.abs(userAns - correctR) < 5) {
                scores.led.correct++;
                solvedState.led = true;
                document.getElementById('btn-check-led').disabled = true;
                document.getElementById('btn-reveal-led').disabled = true;
                showFeedback('feedback-led', true, `Correct!`);
            } else showFeedback('feedback-led', false, "Incorrect. Subtract Vf from the supply voltage, then use Ohm's Law (V=IR), converting mA to Amps!");
            updateScoreboard();
        }
        function revealLED() {
            if (solvedState.led) return;
            solvedState.led = true;
            document.getElementById('btn-check-led').disabled = true;
            document.getElementById('btn-reveal-led').disabled = true;
            
            const correctR = ((currentLED.vs - currentLED.vf) / (currentLED.i / 1000)).toFixed(0);
            document.getElementById('ans-led').value = correctR;

            const msg = `<strong>Worked Solution:</strong> (Scoring disabled)<br><br>
            1. Calculate voltage across the resistor: V_resistor = Supply - Vf = ${currentLED.vs} - ${currentLED.vf} = ${(currentLED.vs - currentLED.vf).toFixed(1)}V.<br>
            2. Convert current to Amps: ${currentLED.i}mA = ${currentLED.i / 1000}A.<br>
            3. Use Ohm's Law (R = V / I): R = ${(currentLED.vs - currentLED.vf).toFixed(1)} / ${currentLED.i / 1000} = <strong>${correctR}Ω</strong>.`;
            showSolution('feedback-led', msg);
        }

        // TAB 2: LDR 
        let currentLDR = { vs: 5, r1: 4.7 };
        function generateLDR() {
            solvedState.ldr = false;
            document.getElementById('btn-check-ldr').disabled = false;
            document.getElementById('btn-reveal-ldr').disabled = false;
            currentLDR.vs = [5, 9, 12][Math.floor(Math.random() * 3)];
            currentLDR.r1 = [1, 2.2, 4.7, 10][Math.floor(Math.random() * 4)];
            document.getElementById('ldr-vs-txt').textContent = currentLDR.vs + 'V';
            document.getElementById('ldr-r1-txt').textContent = 'R1: ' + currentLDR.r1 + 'kΩ';
            document.getElementById('feedback-ldr').style.display = 'none';
            document.getElementById('ans-ldr').value = '';
            document.getElementById('ldr-slider').value = 1;
            updateLDR();
        }
        function updateLDR() {
            const slider = document.getElementById('ldr-slider').value;
            currentLDR.r2 = 11 - slider; 
            document.getElementById('ldr-r2-txt').textContent = 'LDR: ' + currentLDR.r2 + 'kΩ';
            solvedState.ldr = false;
            document.getElementById('btn-check-ldr').disabled = false;
            document.getElementById('btn-reveal-ldr').disabled = false;
            document.getElementById('feedback-ldr').style.display = 'none';
        }
        function checkLDR() {
            if (solvedState.ldr) return;
            const userAns = parseFloat(document.getElementById('ans-ldr').value);
            if(isNaN(userAns)) return;
            
            scores.ldr.attempts++;
            const correctV = currentLDR.vs * (currentLDR.r2 / (currentLDR.r1 + currentLDR.r2));
            if (Math.abs(userAns - correctV) < 0.2) {
                scores.ldr.correct++;
                solvedState.ldr = true;
                document.getElementById('btn-check-ldr').disabled = true;
                document.getElementById('btn-reveal-ldr').disabled = true;
                showFeedback('feedback-ldr', true, `Correct!`);
            } else showFeedback('feedback-ldr', false, "Incorrect. Use the voltage divider formula: Vout = Vin × [ R_bottom / (R_top + R_bottom) ].");
            updateScoreboard();
        }
        function revealLDR() {
            if (solvedState.ldr) return;
            solvedState.ldr = true;
            document.getElementById('btn-check-ldr').disabled = true;
            document.getElementById('btn-reveal-ldr').disabled = true;

            const correctV = (currentLDR.vs * (currentLDR.r2 / (currentLDR.r1 + currentLDR.r2))).toFixed(2);
            document.getElementById('ans-ldr').value = correctV;

            const msg = `<strong>Worked Solution:</strong> (Scoring disabled)<br><br>
            Using the Voltage Divider Formula: Vout = Vin × [ R_bottom / (R_top + R_bottom) ]<br>
            Vout = ${currentLDR.vs}V × [ ${currentLDR.r2}kΩ / (${currentLDR.r1}kΩ + ${currentLDR.r2}kΩ) ]<br>
            Vout = <strong>${correctV}V</strong>.`;
            showSolution('feedback-ldr', msg);
        }

        // TAB 3: OP-AMP
        let currentOpAmp = {};
        function generateOpAmp() {
            solvedState.opamp = false;
            document.getElementById('btn-check-opamp').disabled = false;
            document.getElementById('btn-reveal-opamp').disabled = false;
            currentOpAmp.vin = (Math.random() * 0.9 + 0.1).toFixed(1);
            currentOpAmp.rin = [1, 5, 10][Math.floor(Math.random() * 3)];
            currentOpAmp.rf = [10, 22, 47, 100][Math.floor(Math.random() * 4)];
            document.getElementById('op-vin-txt').textContent = currentOpAmp.vin + 'V';
            document.getElementById('op-rin-txt').textContent = 'Rin: ' + currentOpAmp.rin + 'k';
            document.getElementById('op-rf-txt').textContent = 'Rf: ' + currentOpAmp.rf + 'k';
            document.getElementById('feedback-opamp').style.display = 'none';
            document.getElementById('ans-opamp').value = '';
        }
        function checkOpAmp() {
            if (solvedState.opamp) return;
            const userAns = parseFloat(document.getElementById('ans-opamp').value);
            if(isNaN(userAns)) return;
            
            scores.opamp.attempts++;
            const correctVout = -currentOpAmp.vin * (currentOpAmp.rf / currentOpAmp.rin);
            if (Math.abs(userAns - correctVout) < 0.2) {
                scores.opamp.correct++;
                solvedState.opamp = true;
                document.getElementById('btn-check-opamp').disabled = true;
                document.getElementById('btn-reveal-opamp').disabled = true;
                showFeedback('feedback-opamp', true, `Correct!`);
            } else showFeedback('feedback-opamp', false, "Incorrect. Remember this is an INVERTING amplifier. Gain = -(Rf / Rin). Your answer should be negative!");
            updateScoreboard();
        }
        function revealOpAmp() {
            if (solvedState.opamp) return;
            solvedState.opamp = true;
            document.getElementById('btn-check-opamp').disabled = true;
            document.getElementById('btn-reveal-opamp').disabled = true;

            const correctVout = (-currentOpAmp.vin * (currentOpAmp.rf / currentOpAmp.rin)).toFixed(2);
            document.getElementById('ans-opamp').value = correctVout;

            const msg = `<strong>Worked Solution:</strong> (Scoring disabled)<br><br>
            1. Calculate Gain = -(Rf / Rin) = -(${currentOpAmp.rf}k / ${currentOpAmp.rin}k) = -${currentOpAmp.rf/currentOpAmp.rin}.<br>
            2. Calculate Output = Gain × Vin = -${currentOpAmp.rf/currentOpAmp.rin} × ${currentOpAmp.vin}V = <strong>${correctVout}V</strong>.<br>
            <em>*Note: The negative sign is crucial because it is an inverting amplifier!</em>`;
            showSolution('feedback-opamp', msg);
        }

        // TAB 4: LOGIC GATES
        let currentLogic = {};
        function generateLogic() {
            solvedState.logic = false;
            document.getElementById('btn-check-logic').disabled = false;
            document.getElementById('btn-reveal-logic').disabled = false;
            currentLogic.a = Math.round(Math.random());
            currentLogic.b = Math.round(Math.random());
            currentLogic.c = Math.round(Math.random());
            document.getElementById('log-a-txt').textContent = 'A: ' + currentLogic.a;
            document.getElementById('log-b-txt').textContent = 'B: ' + currentLogic.b;
            document.getElementById('log-c-txt').textContent = 'C: ' + currentLogic.c;
            document.getElementById('feedback-logic').style.display = 'none';
            document.getElementById('ans-logic').value = '';
        }
        function checkLogic() {
            if (solvedState.logic) return;
            const userAns = parseInt(document.getElementById('ans-logic').value);
            if(isNaN(userAns)) return;
            
            scores.logic.attempts++;
            const x = (currentLogic.a && currentLogic.b) ? 1 : 0;
            const correctY = (currentLogic.c || x) ? 1 : 0;
            if (userAns === correctY) {
                scores.logic.correct++;
                solvedState.logic = true;
                document.getElementById('btn-check-logic').disabled = true;
                document.getElementById('btn-reveal-logic').disabled = true;
                showFeedback('feedback-logic', true, `Correct!`);
            } else showFeedback('feedback-logic', false, "Incorrect. Evaluate the AND gate first, then pass that result into the OR gate with C.");
            updateScoreboard();
        }
        function revealLogic() {
            if (solvedState.logic) return;
            solvedState.logic = true;
            document.getElementById('btn-check-logic').disabled = true;
            document.getElementById('btn-reveal-logic').disabled = true;

            const x = (currentLogic.a && currentLogic.b) ? 1 : 0;
            const correctY = (currentLogic.c || x) ? 1 : 0;
            document.getElementById('ans-logic').value = correctY;

            const msg = `<strong>Worked Solution:</strong> (Scoring disabled)<br><br>
            1. First, evaluate the AND gate (Top): A(${currentLogic.a}) AND B(${currentLogic.b}) = ${x}.<br>
            2. Then, pass that into the OR gate (Bottom) with C: ${x} OR C(${currentLogic.c}) = <strong>${correctY}</strong>.`;
            showSolution('feedback-logic', msg);
        }

        // INIT
        generateMixed(); generateLED(); generateLDR(); generateOpAmp(); generateLogic();
    </script>
</body>
</html>
